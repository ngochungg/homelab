services:
  mysql:
    image: mysql:latest
    container_name: mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=Meou2002vn
      - MYSQL_USER=cybercat
      - MYSQL_PASSWORD=Meou2002vn
      - MYSQL_DATABASE=mysql
    ports:
      - 3306:3306
    networks:
      - backend
    volumes:
      - /srv/database/mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: Meou2002vn
    networks:
      - backend
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`mysql.catverse.dev`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=https"
      - "traefik.http.routers.phpmyadmin.tls=true"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=cloudflare"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"

networks:
  frontend:
    external: true
  backend:
    external: true
