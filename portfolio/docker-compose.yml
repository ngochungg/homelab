services:
  portfolio:
    build: .
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio-prod.rule=Host(`catverse.dev`)"
      - "traefik.http.routers.portfolio-prod.entrypoints=https"
      - "traefik.http.routers.portfolio-prod.tls=true"
      - "traefik.http.routers.portfolio-prod.tls.certresolver=cloudflare"
      - "traefik.http.services.portfolio-prod.loadbalancer.server.port=3000"
    networks:
      - frontend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: portfolio-app

  # Development service (optional)
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    ports:
      - 3000:3000
    container_name: portfolio-dev
    profiles:
      - dev

networks:
  frontend:
    external: true