services:
  mc:
    image: itzg/minecraft-server
    container_name: minecraft
    environment:
      EULA: "true"
      MEMORY: "2G"
      TYPE: "PAPER"
      ONLINE_MODE: "false"
    ports:
      - "25565:25565"
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: on-failure 